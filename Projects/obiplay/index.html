<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObiPlay — Video Platform by Obi Enterprises</title>
  <meta name="description" content="ObiPlay is a powerful video platform for streaming, uploading, and editing videos. Built by Obi Enterprises.">
  <meta name="theme-color" content="#050508">
  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e8ff47'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-size='16' font-family='serif' font-weight='900' fill='%23000'>OP</text></svg>">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-layout">

  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="#" onclick="Pages.navigate('home');return false">
      <div class="logo-mark">OP</div>
      <div class="logo-text">Obi<span>Play</span></div>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <button class="nav-item" data-page="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-page="player">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M5 3l14 9-14 9V3z"/></svg>
          <span>Watch</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-label">Create</div>
        <button class="nav-item" data-page="upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span>Upload</span>
        </button>
        <button class="nav-item" data-page="editor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Editor</span>
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-label">Library</div>
        <button class="nav-item" data-page="library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>My Videos</span>
        </button>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <button class="nav-item" id="sidebar-toggle">
        <svg id="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Collapse</span>
      </button>
    </div>
  </aside>

  <!-- ── MAIN WRAPPER ────────────────────────────────── -->
  <div class="main-content" id="main-wrapper">

    <!-- Topbar -->
    <header class="topbar">
      <h1 class="topbar-title" id="topbar-title">Home</h1>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="global-search" placeholder="Search videos..." autocomplete="off">
      </div>
      <button class="btn btn-primary btn-icon" onclick="Pages.navigate('upload')" title="Upload Video" style="padding:9px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </header>

    <!-- Dynamic Page Content -->
    <main id="main-content-area"></main>

  </div><!-- /main-content -->
</div><!-- /app-layout -->

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/app.js"></script>

</body>
</html>
