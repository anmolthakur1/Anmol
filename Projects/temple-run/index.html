<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Temple Run · Obi Enterprises</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ░░ SPLASH SCREEN ░░ -->
<div id="splash">
  <canvas id="splashCanvas"></canvas>

  <div class="splash-overlay">
    <!-- Top brand -->
    <div class="brand-bar">
      <span class="brand-gem">◆</span>
      <span class="brand-text">OBI ENTERPRISES</span>
      <span class="brand-gem">◆</span>
    </div>

    <!-- Main logo -->
    <div class="logo-wrap">
      <div class="logo-fire-left"></div>
      <div class="logo-fire-right"></div>
      <div class="logo-stone">
        <div class="logo-inner">
          <div class="logo-top">TEMPLE</div>
          <div class="logo-divider-wrap">
            <div class="logo-div-line"></div>
            <div class="logo-div-icon">𓂀</div>
            <div class="logo-div-line"></div>
          </div>
          <div class="logo-bottom">RUN</div>
        </div>
      </div>
    </div>

    <!-- Tagline -->
    <div class="tagline">CAN YOU ESCAPE THE DEMON?</div>

    <!-- Founder -->
    <div class="founder-tag">
      <span>⚜</span> ANMOL THAKUR &nbsp;·&nbsp; FOUNDER <span>⚜</span>
    </div>

    <!-- Play button -->
    <button id="playBtn" class="play-btn">
      <div class="play-btn-bg"></div>
      <div class="play-btn-content">
        <span class="play-icon">▶</span>
        <span class="play-text">TAP TO RUN</span>
      </div>
      <div class="play-btn-glow"></div>
    </button>

    <!-- Controls hint -->
    <div class="hint-bar">
      <span class="hint-item">⬅ ➡ &nbsp;DODGE</span>
      <span class="hint-sep">·</span>
      <span class="hint-item">⬆ &nbsp;JUMP</span>
      <span class="hint-sep">·</span>
      <span class="hint-item">⬇ &nbsp;SLIDE</span>
      <span class="hint-sep">·</span>
      <span class="hint-item">📱 SWIPE</span>
    </div>
  </div>

  <!-- Bottom gradient -->
  <div class="splash-bottom-grad"></div>
</div>

<!-- ░░ HUD ░░ -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div class="hud-pill score-pill">
      <span class="hud-label">SCORE</span>
      <span id="scoreVal" class="hud-val">0</span>
    </div>
    <div class="hud-pill coin-pill">
      <span class="coin-icon">🪙</span>
      <span id="coinVal" class="hud-val">0</span>
    </div>
  </div>
  <div class="hud-right">
    <div class="hud-pill dist-pill">
      <span class="hud-label">📍</span>
      <span id="distVal" class="hud-val">0m</span>
    </div>
    <div class="hud-pill spd-pill">
      <span class="hud-label">⚡</span>
      <span id="spdVal" class="hud-val">1.0×</span>
    </div>
  </div>
</div>

<!-- ░░ GAME CANVAS ░░ -->
<canvas id="gameCanvas"></canvas>

<!-- ░░ SWIPE ZONES (mobile) ░░ -->
<div id="swipeLeft"  class="swipe-zone swipe-l"></div>
<div id="swipeRight" class="swipe-zone swipe-r"></div>
<div id="swipeUp"    class="swipe-zone swipe-u"></div>
<div id="swipeDown"  class="swipe-zone swipe-d"></div>

<!-- ░░ GAME OVER ░░ -->
<div id="gameOverScreen" class="hidden">
  <div class="go-backdrop"></div>
  <div class="go-panel">
    <div class="go-demon-icon">👹</div>
    <h2 class="go-title">CAUGHT!</h2>
    <p class="go-sub">The demon claims another soul…</p>
    <div class="go-stats">
      <div class="go-stat-box">
        <span class="gs-label">SCORE</span>
        <span class="gs-val" id="goScore">0</span>
      </div>
      <div class="go-stat-box">
        <span class="gs-label">COINS</span>
        <span class="gs-val" id="goCoins">0</span>
      </div>
      <div class="go-stat-box">
        <span class="gs-label">DIST</span>
        <span class="gs-val" id="goDist">0m</span>
      </div>
      <div class="go-stat-box highlight">
        <span class="gs-label">BEST</span>
        <span class="gs-val" id="goBest">0</span>
      </div>
    </div>
    <button id="restartBtn" class="play-btn small">
      <div class="play-btn-bg"></div>
      <div class="play-btn-content">↺ &nbsp;RUN AGAIN</div>
      <div class="play-btn-glow"></div>
    </button>
    <div class="go-brand">OBI ENTERPRISES · ANMOL THAKUR</div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
